spring.application.name=samkash-farm-api

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/samaksh_farms}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=${JPA_SHOW_SQL:false}

spring.jpa.properties.hibernate.format_sql=true

app.security.jwt.secret=${JWT_SECRET:samaksh-farms-local-development-jwt-secret-change-before-prod}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.name=${BOOTSTRAP_ADMIN_NAME:Samaksh Farms Admin}
